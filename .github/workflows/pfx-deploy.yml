name: PFX Deploy Safe

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy PFX
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PFX_SSH_KEY }}" > ~/.ssh/pfx_key
          chmod 600 ~/.ssh/pfx_key
          ssh-keyscan -p "${{ secrets.PFX_PORT }}" -t rsa,ecdsa,ed25519 -H "${{ secrets.PFX_HOST }}" >> ~/.ssh/known_hosts

      - name: Start PFX Deploy Async
        shell: bash
        run: |
          ssh -p "${{ secrets.PFX_PORT }}" -o ServerAliveInterval=30 -o ServerAliveCountMax=6 -o StrictHostKeyChecking=no -i ~/.ssh/pfx_key "${{ secrets.PFX_USER }}@${{ secrets.PFX_HOST }}" "sudo /usr/local/bin/pfx-deploy-async"

      - name: Wait Deploy
        run: |
          sleep 90

      - name: Read Deploy Log
        shell: bash
        run: |
          ssh -p "${{ secrets.PFX_PORT }}" -o ServerAliveInterval=30 -o ServerAliveCountMax=6 -o StrictHostKeyChecking=no -i ~/.ssh/pfx_key "${{ secrets.PFX_USER }}@${{ secrets.PFX_HOST }}" "sudo /usr/local/bin/pfx-deploy-last-log"

      - name: Check PFX Status
        shell: bash
        run: |
          ssh -p "${{ secrets.PFX_PORT }}" -o ServerAliveInterval=30 -o ServerAliveCountMax=6 -o StrictHostKeyChecking=no -i ~/.ssh/pfx_key "${{ secrets.PFX_USER }}@${{ secrets.PFX_HOST }}" "sudo /usr/local/bin/pfx-status"
